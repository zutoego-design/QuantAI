hypothesis: "Quality and medium-term momentum improve risk-adjusted S&P 500 returns."
universe: "sp500_historical_standard"
factors:
  - roe
  - gross_margin
  - momentum_12_1
  - momentum_6m
preprocessing:
  winsorize:
    enabled: true
    lower_quantile: 0.01
    upper_quantile: 0.99
  neutralization:
    sector: true
    market_cap: true
portfolio:
  target_num_holdings: 50
  max_weight: 0.05
  max_sector_weight: 0.25
  max_turnover_per_rebalance: 0.30
costs:
  commission_bps: 1.0
  slippage_bps: 5.0
  market_impact_coefficient: 0.10
  max_adv_participation: 0.10
model:
  enabled: true
  model_type: "ridge"
  target: "cross_sectional_rank"
  parameters:
    alpha: 1.0
  portfolio_top_n: 50
  transaction_cost_bps: 10.0
  walk_forward:
    train_periods: 18
    min_train_periods: 12
    test_periods: 3
    step_periods: 3
    purge: true
    embargo_days: 5
robustness_tests:
  - subperiod
  - cost_sensitivity
  - top_n_sensitivity
  - rebalance_day_shift
start_date: "2023-01-01"
end_date: "2026-06-12"
seed: 42
max_years: 20
