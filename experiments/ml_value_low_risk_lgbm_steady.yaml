hypothesis: "A value plus low-risk LightGBM baseline can improve ranking quality without changing confirmatory validation gates."
universe: "sp500_historical_standard"
factors:
  - book_to_market
  - earnings_yield
  - free_cash_flow_yield
  - sales_yield
  - beta_to_spy
  - max_drawdown_252d
  - realized_vol_252d
  - realized_vol_60d
portfolio:
  target_num_holdings: 25
  max_weight: 0.05
  max_sector_weight: 0.25
  max_turnover_per_rebalance: 0.30
costs:
  commission_bps: 1.0
  slippage_bps: 5.0
  market_impact_coefficient: 0.10
  max_adv_participation: 0.10
model:
  enabled: true
  model_type: "lightgbm"
  target: "cross_sectional_rank"
  parameters:
    n_estimators: 80
    learning_rate: 0.03
    num_leaves: 7
    min_child_samples: 30
    subsample: 0.9
    colsample_bytree: 0.9
    reg_alpha: 0.1
    reg_lambda: 1.5
    random_state: 42
    verbosity: -1
  portfolio_top_n: 25
  transaction_cost_bps: 10.0
  walk_forward:
    train_periods: 60
    min_train_periods: 12
    test_periods: 3
    step_periods: 3
    rolling: true
    purge: true
    embargo_days: 5
robustness_tests: []
start_date: "2016-01-01"
end_date: "2026-06-11"
seed: 42
max_years: 20
