name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  quality-and-research:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync locked environment
        run: uv sync --frozen --extra dev

      - name: Ruff
        run: uv run ruff check .

      - name: Compile
        run: uv run python -m compileall -q src tests

      - name: Data contracts and research credibility
        run: >
          uv run pytest -q
          tests/test_config.py
          tests/test_data_validation.py
          tests/test_point_in_time.py
          tests/test_research_credibility.py

      - name: End-to-end research recomputation
        run: uv run pytest -q tests/test_e2e_research_run.py

      - name: Full test suite
        run: uv run pytest -q
