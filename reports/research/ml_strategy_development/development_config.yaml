protocol:
  research_stage: historical_pseudo_out_of_sample
  development_end: '2023-12-29'
  holdout_start: '2024-02-01'
  holdout_end: '2026-06-11'
  development_search_trials: 18
  final_holdout_trial_count: 1
model_factors:
- book_to_market
- earnings_yield
- free_cash_flow_yield
- sales_yield
- beta_to_spy
- max_drawdown_252d
- realized_vol_252d
- realized_vol_60d
style_exposures:
- book_to_market
- earnings_yield
- free_cash_flow_yield
- sales_yield
- beta_to_spy
- realized_vol_252d
- realized_vol_60d
bayesian_search_dimensions:
- name: learning_rate
  kind: float
  low: 0.01
  high: 0.08
  scale: log
- name: n_estimators
  kind: int
  low: 50
  high: 180
- name: num_leaves
  kind: int
  low: 3
  high: 15
- name: min_child_samples
  kind: int
  low: 20
  high: 100
- name: subsample
  kind: float
  low: 0.6
  high: 1.0
- name: colsample_bytree
  kind: float
  low: 0.6
  high: 1.0
- name: reg_alpha
  kind: float
  low: 0.0
  high: 2.0
- name: reg_lambda
  kind: float
  low: 0.5
  high: 5.0
- name: train_periods
  kind: choice
  choices:
  - 36
  - 48
  - 60
- name: portfolio_top_n
  kind: choice
  choices:
  - 25
  - 35
  - 50
best_ml_config:
  enabled: true
  model_type: lightgbm
  target: cross_sectional_rank
  parameters:
    n_estimators: 86
    learning_rate: 0.055453866519742816
    num_leaves: 4
    min_child_samples: 67
    subsample: 0.6907147878753861
    colsample_bytree: 0.6319387443168342
    reg_alpha: 1.2191228708553223
    reg_lambda: 0.9434854629810787
    random_state: 42
    verbosity: -1
  portfolio_top_n: 50
  transaction_cost_bps: 10.0
  walk_forward:
    train_periods: 60
    test_periods: 3
    step_periods: 3
    min_train_periods: 12
    rolling: true
    purge: true
    embargo_days: 5
